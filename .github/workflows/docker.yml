name: Build Docker Images

# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
      - cron_entrypoint.sh
  # only build without pushing on PRs
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
      - cron_entrypoint.sh
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

# only allow one build at a time per branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: firefart/requesttracker

jobs:
  build:
    runs-on: ${{ matrix.builders.runner }}

    strategy:
      matrix:
        builders:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
        versions:
          - rt: "5.0.8"
            rtir: "5.0.8"
          - rt: "5.0.9"
            rtir: "5.0.8"
          - rt: "6.0.0"
            rtir: "5.0.8"
          - rt: "6.0.1"
            rtir: "6.0.1"
          - rt: "6.0.2"
            rtir: "6.0.1"

    steps:
      - name: checkout sources
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare
        run: |
          platform=${{ matrix.builders.platform }}
          rt=${{ matrix.versions.rt }}
          echo "ARTIFACT_NAME=${rt}-${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          build-args: |
            RT_VERSION=${{ matrix.versions.rt }}
            RTIR_VERSION=${{ matrix.versions.rtir }}
          context: .
          file: Dockerfile
          platforms: ${{ matrix.builders.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.REGISTRY_IMAGE }}
          push: ${{ github.ref == 'refs/heads/main' }}
          sbom: true
          provenance: mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=${{ github.ref == 'refs/heads/main' }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      matrix:
        versions:
          - rt: "5.0.8"
          - rt: "5.0.9"
            create_major: "true" # only enable on the latest version of a major
          - rt: "6.0.0"
          - rt: "6.0.1"
          - rt: "6.0.2"
            latest_tag: "true" # point the latest tag to this version
            create_major: "true" # only enable on the latest version of a major
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.versions.rt }}-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: |
            # disable setting the latest tag by default
            latest=false
          tags: |
            # Enable latest tag if set
            type=raw,value=latest,enable=${{ matrix.versions.latest_tag == 'true' }}
            # Create a tag for the major version
            type=semver,pattern={{major}},value=${{ matrix.versions.rt }},enable=${{ matrix.versions.create_major == 'true' }}
            # Create a tag for the full version
            type=raw,value=${{ matrix.versions.rt }}
            type=raw,value=nightly-${{ matrix.versions.rt }}-{{date 'YYYYMMDD'}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  diff:
    runs-on: ubuntu-latest
    needs:
      - merge
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        versions:
          - rt: "5.0.8"
          - rt: "5.0.9"
          - rt: "6.0.0"
          - rt: "6.0.1"
          - rt: "6.0.2"
    steps:
      - name: Compute image tags
        id: tags
        run: |
          TODAY=$(date -u +%Y%m%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y%m%d)
          echo "new_image=${{ env.REGISTRY_IMAGE }}:nightly-${{ matrix.versions.rt }}-${TODAY}" >> $GITHUB_OUTPUT
          echo "old_image=${{ env.REGISTRY_IMAGE }}:nightly-${{ matrix.versions.rt }}-${YESTERDAY}" >> $GITHUB_OUTPUT

      - name: Pull new image
        run: docker pull ${{ steps.tags.outputs.new_image }}

      - name: Pull old image
        id: pull_old
        run: |
          if docker pull ${{ steps.tags.outputs.old_image }}; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No previous nightly image found for ${{ steps.tags.outputs.old_image }}, skipping diff"
          fi

      - name: Compare images
        if: steps.pull_old.outputs.found == 'true'
        run: |
          OLD_IMAGE="${{ steps.tags.outputs.old_image }}"
          NEW_IMAGE="${{ steps.tags.outputs.new_image }}"

          echo "Comparing ${OLD_IMAGE} -> ${NEW_IMAGE}"

          get_files() {
            docker run --rm --entrypoint="" "$1" \
              sh -c 'find / -xdev -type f 2>/dev/null | sort | xargs -r md5sum 2>/dev/null' \
              | awk -F'  ' '{print $2 "\t" $1}' | sort -t$'\t' -k1,1
          }

          get_files "$OLD_IMAGE" > old_files.txt
          get_files "$NEW_IMAGE" > new_files.txt

          {
            echo "=== Image diff: RT ${{ matrix.versions.rt }} ==="
            echo "Old: ${OLD_IMAGE}"
            echo "New: ${NEW_IMAGE}"
            echo ""

            added=$(comm -13 <(awk -F'\t' '{print $1}' old_files.txt) <(awk -F'\t' '{print $1}' new_files.txt))
            removed=$(comm -23 <(awk -F'\t' '{print $1}' old_files.txt) <(awk -F'\t' '{print $1}' new_files.txt))
            changed=$(join -t$'\t' old_files.txt new_files.txt | awk -F'\t' '$2 != $3 {print $1}')

            if [ -n "$added" ]; then
              echo "--- Added ---"
              echo "$added" | while read -r f; do echo "  + $f"; done
              echo ""
            fi

            if [ -n "$removed" ]; then
              echo "--- Removed ---"
              echo "$removed" | while read -r f; do echo "  - $f"; done
              echo ""
            fi

            if [ -n "$changed" ]; then
              echo "--- Changed ---"
              echo "$changed" | while read -r f; do echo "  ~ $f"; done
              echo ""
            fi

            added_count=$(echo "$added" | grep -c . || true)
            removed_count=$(echo "$removed" | grep -c . || true)
            changed_count=$(echo "$changed" | grep -c . || true)
            echo "Summary: ${added_count} added, ${removed_count} removed, ${changed_count} changed"
          } | tee diff_rt_${{ matrix.versions.rt }}.txt

      - name: Upload diff artifact
        if: steps.pull_old.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: image-diff-rt-${{ matrix.versions.rt }}
          path: diff_rt_${{ matrix.versions.rt }}.txt
          retention-days: 30
