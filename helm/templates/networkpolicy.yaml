{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rt
  labels:
    {{- include "request-tracker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "request-tracker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rt
  policyTypes:
    - Ingress
  ingress:
    # web port: reachable from anywhere (ingress controller / route)
    - ports:
        - port: {{ .Values.caddy.ports.http }}
          protocol: TCP
        - port: {{ .Values.caddy.ports.health }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    # mailgate port: only the explicitly allowed pods (e.g. the getmail cronjob)
    - ports:
        - port: {{ .Values.caddy.ports.mailgate }}
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.mailgateAllowLabels | nindent 14 }}
{{- end }}
