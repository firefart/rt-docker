rt:
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  image:
    repository: firefart/requesttracker
    pullPolicy: Always
    # leave empty to use the chart appVersion as the tag
    tag: ""

  # Deployment update strategy. The rt pods mount ReadWriteOnce PVCs
  # (gpg/smime/shredder/cron), so a RollingUpdate would deadlock waiting for
  # the old pod to release the volume. Use Recreate unless those PVCs are
  # ReadWriteMany. Set to {} to use the Kubernetes default (RollingUpdate).
  strategy:
    type: Recreate

  imagePullSecrets: []

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000 # the user id of the rt user in the container
    runAsGroup: 1000 # the group id of the rt user in the container
    allowPrivilegeEscalation: false
    # capabilities:
    #   drop:
    #   - ALL

  podSecurityContext:
    {}
    # fsGroup: 2000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  resourcesInitContainer:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  volumes: []

  volumeMounts: []

  # the port the RT-FCGI server listens on
  port: 9000

caddy:
  image:
    repository: caddy
    pullPolicy: IfNotPresent
    # pin to a concrete version for reproducible deploys
    tag: "2.10"

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534 # nobody user in the caddy image
    runAsGroup: 65534 # nobody group in the caddy image
    # capabilities:
    #   drop:
    #   - ALL

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /
      port: health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 10
    failureThreshold: 3

  volumes: []

  volumeMounts: []

  ports:
    http: 80
    mailgate: 8080
    health: 1337

  service:
    type: ClusterIP
    port: 80
    mailgatePort: 8080

postgres:
  enabled: true
  # Postgres must stay at a single replica: all replicas would share the same
  # ReadWriteOnce data volume, which corrupts the database. There is
  # deliberately no autoscaling here.
  replicaCount: 1
  # The data PVC is ReadWriteOnce, so a RollingUpdate would deadlock. Recreate
  # terminates the old pod before starting the new one.
  strategy:
    type: Recreate
  image:
    repository: postgres
    pullPolicy: IfNotPresent
    tag: "17.6"
  imagePullSecrets: []

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 999 # postgres user in the postgres image
    runAsGroup: 999 # postgres group in the postgres image
    # capabilities:
    #   drop:
    #   - ALL

  podSecurityContext:
    fsGroup: 999 # postgres group in the postgres image

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  volumes: []

  volumeMounts: []

  service:
    type: ClusterIP
    port: 5432

# Database credentials, consumed via the "rt-db-creds" Secret.
db:
  # When true the chart creates the Secret from the values below.
  # When false (default) you must create a Secret named "rt-db-creds"
  # yourself (see dev-helm.sh) or point existingSecret at one.
  create: false
  # Use an already existing Secret instead of the chart-managed one.
  # It must contain the keys: dbname, username, password.
  existingSecret: ""
  # only used when create is true
  name: rt
  username: rt
  password: ""

# Timezone applied to all containers via the TZ env var. Mirrors the
# /etc/localtime bind mount used in the docker-compose setup.
# Leave empty to inherit the image default (UTC).
timezone: "UTC"

# PodDisruptionBudget for the rt deployment (useful with multiple replicas/HPA).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Restrict traffic to the rt pods. The mailgate port (8080) is sensitive: in
# docker-compose it is only bound to localhost. When enabled, only pods
# carrying one of mailgateAllowLabels may reach it; the web port stays open.
networkPolicy:
  enabled: false
  # additional namespace/pod selectors allowed to reach the web port
  ingress: []
  # pods allowed to reach the mailgate port (e.g. the getmail cronjob)
  mailgateAllowLabels:
    app.kubernetes.io/name: rt

serviceAccount:
  create: true
  automount: true
  annotations: {}

podAnnotations: {}
podLabels: {}

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Use an openshift route to expose the service.
route:
  enabled: false
  hostName: chart-example.local
  annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

