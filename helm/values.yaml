# used to store shredder backups
pvc:
  gpg:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  smime:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  shredder:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  cron:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  caddyData:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  caddyConfig:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi
  postgresData:
    enabled: true
    # accessMode: ReadWriteMany
    accessMode: ReadWriteOnce
    storageClass: ""
    size: 1Gi

config:
  rtSiteConfig: |
    ### Base configuration ###
    Set($rtname, 'rt');
    Set($WebDomain, 'localhost');
    Set($WebPort, 443);
    Set($CanonicalizeRedirectURLs, 1);
    Set($CanonicalizeURLsInFeeds, 1);

    Plugin('RT::Extension::MergeUsers');
    Plugin('RT::Extension::TerminalTheme');

    ### Database connection ###
    Set($DatabaseType, 'Pg' );
    Set($DatabaseHost, 'rt-db');
    Set($DatabasePort, '5432');
    Set($DatabaseUser, '{{ .Env.RT_DB_USER }}');
    Set($DatabasePassword, '{{ .Env.RT_DB_PASS }}');
    Set($DatabaseName, '{{ .Env.RT_DB_NAME }}');
    Set($DatabaseAdmin, '{{ .Env.RT_DB_USER }}');

    Set($SendmailPath, '/usr/bin/msmtp');

    ### GnuPG configuration ###
    Set(%GnuPG,
      Enable                 => 1,
      GnuPG                  => 'gpg',
      Passphrase             => undef,
      OutgoingMessagesFormat => 'RFC'
    );

    Set(%GnuPGOptions,
      homedir             => '/opt/rt/var/data/gpg',
      passphrase          => 'PASSPHRASE',
      keyserver           => 'hkps://keys.openpgp.org',
      'keyserver-options' => 'auto-key-retrieve timeout=20',
      'auto-key-locate'   => 'keyserver',
    );

    ### SMIME configuration ###
    Set(%SMIME,
        Enable             => 1,
        AcceptUntrustedCAs => 1,
        OpenSSL            => '/usr/bin/openssl',
        Keyring            => '/opt/rt/var/data/smime',
        CAPath             => '/opt/rt/var/data/smime/signing-ca.pem',
        Passphrase => {
            'user@user.com' => 'PASSPHRASE',
            ''              => 'fallback',
        },
    );

    1;
  msmtp: |
    defaults

    account smtp
    host smtp.office365.com
    port 587
    tls on
    tls_starttls on
    from test@test.com
    # use the system CA bundle shipped in the image; mount your own at
    # /msmtp/ca-bundle.crt via rt.volumes/volumeMounts if you need a custom one
    tls_trust_file /etc/ssl/certs/ca-certificates.crt
    tls_certcheck on
    auth on
    user user@domain.com
    password pass
    logfile -

    account default : smtp
  getmailrc: |
    [retriever]
    type = SimpleIMAPSSLRetriever
    server = mail.host.com
    username = user@domain.com
    password = pass
    mailboxes = ("INBOX",)

    [destination]
    type = MDA_external
    path = /opt/rt/bin/rt-mailgate
    user = rt
    group = rt
    # 8080 is the mailgate vhost
    arguments = ("--url", "http://rt-caddy:8080/", "--queue", "general", "--action", "correspond",)

    [options]
    read_all = false
    delete = true
    verbose = 0
  caddyfile: |
    {
      debug
      admin off
      auto_https off
    }

    # healthchecks
    :1337 {
      respond "OK" 200
    }

    # mailgate
    :8080 {
      log
      reverse_proxy localhost:9000 {
        transport fastcgi
      }
    }

    # request tracker
    :80 {
      log

      # Block access to the unauth mail gateway endpoint
      # we have a seperate mailgate server for that
      @blocked path /REST/1.0/NoAuth/mail-gateway
      respond @blocked "Nope" 403

      reverse_proxy localhost:9000 {
        transport fastcgi
      }
    }
